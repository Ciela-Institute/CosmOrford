model:
  class_path: cosmoford.models_nopatch.RegressionModelNoPatch
  init_args:
    backbone: "efficientnet_v2_s"
    warmup_steps: 500
    max_lr: 0.008
    decay_rate: 0.85
    decay_every_epochs: 1
    dropout_rate: 0.2
    loss_type: "log_prob"
    use_flow: true

data:
  class_path: cosmoford.dataset.ChallengeDataModule
  init_args:
    batch_size: 64
    num_workers: 8
    max_train_samples: 0

trainer:
  default_root_dir: "/home/noedia/links/scratch/wl_chall/models"
  max_epochs: 50
  accelerator: gpu
  precision: "16-mixed"
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: ModelCheckpoint
      init_args:
        monitor: "val_nll"
        mode: "min"
        save_top_k: 3
        save_last: true
    - class_path: EarlyStopping
      init_args:
        monitor: "val_nll"
        patience: 10
        mode: "min"
  logger:
    class_path: WandbLogger
    init_args:
      name: "effnet_v2_s_ngll"
      project: "neurips-wl-challenge"
      entity: "cosmostat"
      save_dir: "/home/noedia/links/scratch/wl_chall/models/vmim_npe_stuff"
      log_model: true
 
