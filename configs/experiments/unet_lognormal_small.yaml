# Best hyperparameters from ablation phases
ot_method: emd
ot_reg: 0.1       # unused for emd
eps: 0.001
sigma: 0.0001     # Phase 3 best

base_lr: 5.0e-4   # Phase 4 best
gamma: 0.85       # Phase 4 best
max_steps: 70000

batch_size: 500
micro_batch_size: 40

# Either a single metric name, or a {name: weight} mapping to select the best
# checkpoint by the weighted mean of several metrics, e.g.:
#   best_ckpt_metric: {val_loss: 1.0, pqm_chi2: 0.01, power_spectrum: 5.0}
# Weights are in raw metric units (no auto-normalization) -- pick them with
# each metric's scale in mind. Summary statistics currently trackable:
#   - val_loss       : flow-matching validation MSE, ~O(1)
#   - pqm_chi2       : PQMass chi^2 between generated and N-body maps, ~O(100)
#   - power_spectrum : mean squared relative deviation of the binned power
#                       spectrum between generated and N-body maps, ~O(1e-2)
#   - hos_peaks      : MSE on log1p mean peak-count histograms, ~O(1e-3)
#                       (Andreas Tersenov); needs `pip install wl_stats_torch`
#   - hos_l1         : MSE on log1p mean L1-norm histograms, ~O(1)
#                       (Andreas Tersenov); needs `pip install wl_stats_torch`
#   - scattering     : MSE on mean scattering coefficients (J=5,L=8), ~O(1e-5)
#                       (Andreas Tersenov); needs `pip install kymatio`
best_ckpt_metric:
  val_loss: 1.0        # ~O(1)
  power_spectrum: 100  # ~O(1e-2) → ×100 to equalize
  hos_peaks: 300       # ~O(3e-3) → ×300 to equalize
  hos_l1: 0.3          # ~O(3)    → ×0.3 to equalize
  scattering: 50000    # ~O(2e-5) → ×5e4 to equalize
  # Scales estimated from random Gaussian maps -- tune after first runs.
n_eval_stats: 40

dataset_dir_nbody: /home/juzgh/links/projects/rrg-lplevass/shared/wl_chall_data/neurips-wl-challenge-flat
dataset_dir_logn_train: /home/juzgh/links/projects/rrg-lplevass/shared/wl_chall_data/lognormal
dataset_dir_pqm_nbody: /home/juzgh/links/projects/rrg-lplevass/shared/wl_chall_data/neurips-wl-challenge

