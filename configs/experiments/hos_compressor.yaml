# Stage 1: Train MLP compressor (summary statistics -> 8-dim bottleneck).
#
# Uses the best-performing summary configuration from the ablation study:
#   HOS (ns=4, nbins=51, l1nbins=80, peaks=[-5,10], L1=[-10,10])
#   + Scattering (J=4, L=8)
# Total input dim: 4*(51+80) + scattering_n_coefficients(4,8) = 524 + 417 = 941.
#
# After training, use the saved checkpoint path in hos_posterior.yaml.

model:
  class_path: cosmoford.hos_compressor.HOSCompressor
  init_args:
    # --- Summary statistics (match best ablation config) ---
    use_hos: true
    hos_n_scales: 4
    hos_n_bins: 51
    hos_l1_nbins: 80
    hos_min_snr: -5.0
    hos_max_snr: 10.0
    hos_l1_min_snr: -10.0
    hos_l1_max_snr: 10.0
    use_scattering: true
    scattering_J: 4
    scattering_L: 8
    use_ps: false
    # --- MLP architecture ---
    summary_dim: 8
    hidden_dim: 512
    n_hidden: 3
    dropout_rate: 0.1
    # --- Training ---
    warmup_steps: 500
    max_lr: 0.001
    decay_rate: 0.85
    decay_every_epochs: 1

data:
  class_path: cosmoford.dataset.ChallengeDataModule
  init_args:
    batch_size: 256
    num_workers: 12

trainer:
  max_epochs: 30
  accelerator: gpu
  precision: "16-mixed"
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: cosmoford.trainer.EMAWeightAveraging
    - class_path: ModelCheckpoint
      init_args:
        monitor: "val_score"
        mode: "max"
        save_top_k: 3
        save_last: true
  logger:
    class_path: WandbLogger
    init_args:
      name: "hos_compressor"
      project: "neurips-wl-challenge"
      entity: "cosmostat"
      log_model: true
