# NPE budget scan hyperparameters
# Used by scripts/run_npe_budget_scan.py (local mode)

# Simulation budgets to evaluate
budgets: [100, 200, 500, 1000, 2000, 5000, 10000, 20200]

# Compressor loading / checkpoint selection
compressor_class_path: "cosmoford.models_nopatch.RegressionModelNoPatch"
checkpoint_metric_name: "val_log_prob"
checkpoint_mode: "min"
wandb_entity: "cosmostat"
wandb_project: "neurips-wl-challenge-hos-compression"
wandb_budget_tag: "budget-scan"
log_npe_to_wandb: true
wandb_npe_entity: "cosmostat"
wandb_npe_project: "neurips-wl-challenge-hos-npe"
wandb_npe_tags: ["hos-npe", "inference"]
wandb_npe_log_images: true

# Summary pre-computation
n_noise_realizations: 1

# NPE training
npe_epochs: 500
npe_lr: 1.0e-3
npe_batch_size: 512
npe_patience: 50
npe_seeds: 5
flow_transforms: 4
flow_hidden_dim: 64

# FoM evaluation
n_posterior_samples: 10000
use_getdist_contours: true
