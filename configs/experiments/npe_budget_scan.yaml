# NPE budget scan hyperparameters
# Used by scripts/run_npe_budget_scan.py (local mode)

# Simulation budgets to evaluate
budgets: [100, 200, 500, 1000, 2000, 5000, 10000, 20200]

# Summary pre-computation
n_noise_realizations: 16

# NPE training
npe_epochs: 500
npe_lr: 1.0e-3
npe_batch_size: 512
npe_patience: 50
npe_seeds: 5

# FoM evaluation
n_posterior_samples: 10000
