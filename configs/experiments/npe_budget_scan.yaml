# NPE budget scan hyperparameters
# Used by scripts/run_npe_budget_scan.py (local mode)

# Simulation budgets to evaluate
budgets: [100, 1000, 5000, 10000, 20200]

# Summary pre-computation
n_noise_realizations: 1

# NPE training
npe_epochs: 100
npe_lr: 1.0e-4
npe_batch_size: 128
npe_patience: 50
npe_seeds: 10

# FoM evaluation
n_posterior_samples: 10000

# Calibration validation (TARP + MIRA) — requires `pip install tarp mira_score`
n_val_maps: 5000
n_val_posterior_samples: 10000

# flow architecture
n_transforms: 5
context_dim: 8
hidden_dim: 64

# "ensemble" samples from a uniform mixture over all npe_seeds flows (better
# calibration); "best" samples only from the single lowest-val_nll flow (sharper FoM)
inference_mode: ensemble 