model:
  class_path: cosmoford.models_nopatch.RegressionModelNoPatch
  init_args:
    backbone: "efficientnet_v2_s"
    summary_dim: 8
    warmup_steps: 500
    max_lr: 0.008
    decay_rate: 0.85
    decay_every_epochs: 1
    dropout_rate: 0.2
    loss_type: "log_prob"

data:
  class_path: cosmoford.dataset.ChallengeDataModule
  init_args:
    batch_size: 64
    num_workers: 8

trainer:
  max_steps: 13000
  accelerator: gpu
  precision: "16-mixed"
  log_every_n_steps: 1
  val_check_interval: 500
  check_val_every_n_epoch: null
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: EMAWeightAveraging
    - class_path: ModelCheckpoint
      init_args:
        monitor: "val_log_prob"
        mode: "min"
        save_top_k: 3
        save_last: true
  logger:
    class_path: WandbLogger
    init_args:
      name: "efficientnet_v2_s_logp"
      project: "neurips-wl-challenge"
      entity: "cosmostat"
      save_dir: "/home/noedia/links/scratch/wl_chall/models/budget_scan_nbody"
      log_model: true
