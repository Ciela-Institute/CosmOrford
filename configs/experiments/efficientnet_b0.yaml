# configs/experiments/efficientnet_b0.yaml
model:
  class_path: cosmorford.compressor.CompressorModel
  init_args:
    backbone: "efficientnet_b0"
    bottleneck_dim: 8
    warmup_steps: 500
    max_lr: 0.008
    decay_rate: 0.85
    dropout_rate: 0.2

data:
  class_path: cosmorford.dataset.WLDataModule
  init_args:
    batch_size: 128
    num_workers: 8

trainer:
  max_epochs: 30
  accelerator: gpu
  precision: "16-mixed"
  log_every_n_steps: 1
  check_val_every_n_epoch: 1
  callbacks:
    - class_path: LearningRateMonitor
      init_args:
        logging_interval: "step"
    - class_path: ModelCheckpoint
      init_args:
        monitor: "val_loss"
        mode: "min"
        save_top_k: 3
        save_last: true
  logger:
    class_path: WandbLogger
    init_args:
      name: "efficientnet_b0"
      project: "cosmorford"
      log_model: true
